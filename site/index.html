<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabulaKit</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'dark', themeVariables: { primaryColor: '#2E4057', primaryTextColor: '#ddd', primaryBorderColor: '#3bc0cb', lineColor: '#3bc0cb', secondaryColor: '#333', tertiaryColor: '#222' } });</script>
  <script src="config.js"></script>
  <script src="auth-config.js"></script>
  <!-- TabulaKit framework styles (updated by /tabula-update — do not edit) -->
  <link rel="stylesheet" href="css/tabulakit.css">
  <!-- Your custom overrides (never touched by updates) -->
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <div id="auth-gate" style="display:none">
    <h1 id="auth-site-name"></h1>
    <p id="auth-site-desc"></p>
    <p class="subtitle" id="auth-hint"></p>
    <button id="sign-in-btn" onclick="signIn()">Sign in with Google</button>
    <div id="email-link-section" style="display:none">
      <div class="auth-divider">or</div>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
      <button id="email-link-btn" onclick="sendEmailLink()">Email me a sign-in link</button>
      <p id="email-link-status" style="display:none"></p>
    </div>
    <p id="auth-error" class="error" style="display:none"></p>
  </div>
  <div id="app"></div>

  <script>
    // Host bridge — accept nav commands from a hosting parent (e.g. the
    // TabulaKit VS Code extension's preview panel). Cross-origin script
    // access is blocked by SOP, so the host can't drive history or read
    // location directly; postMessage is the supported escape hatch.
    // The corresponding outbound side (route announcements) lives in the
    // host-bridge docsify plugin further down.
    window.addEventListener('message', function(e) {
      var d = e.data;
      if (!d || d.type !== 'tabulakit:nav') return;
      if (d.action === 'back') history.back();
      else if (d.action === 'forward') history.forward();
      else if (d.action === 'reload') location.reload();
    });

    (function() {
      var config = window.TABULAKIT_CONFIG || {};
      var auth = window.TABULAKIT_AUTH || { mode: "public" };
      var theme = config.theme || {};

      // Apply site title
      document.title = config.name || "Documentation";

      // Apply theme colors from config
      var root = document.documentElement.style;
      if (theme.color) {
        root.setProperty('--theme-color', theme.color);
        root.setProperty('--heading-color', theme.color);
        root.setProperty('--heading-h2-color', theme.color);
      }
      if (theme.tealColor) {
        root.setProperty('--theme-color-teal', theme.tealColor);
        root.setProperty('--sidebar-nav-link-color--active', theme.tealColor);
        root.setProperty('--sidebar-name-color', theme.tealColor);
        root.setProperty('--link-color', theme.tealColor);
      }
      if (theme.sidebarWidth) {
        root.setProperty('--sidebar-width', theme.sidebarWidth);
      }
      if (theme.baseFontSize) {
        root.setProperty('--base-font-size', theme.baseFontSize);
      }

      // Build sidebar name (with optional logo)
      var sidebarName = config.name || "Documentation";
      if (config.logo) {
        sidebarName = '<img src="' + config.logo + '" alt="" style="width:36px;vertical-align:middle;margin-right:10px">' + sidebarName;
      }

      function loadDocsify() {
        // Hide auth gate, show app
        var gate = document.getElementById('auth-gate');
        if (gate) gate.style.display = 'none';
        document.getElementById('app').style.display = '';

        var docsifyOpts = config.docsify || {};

        window.$docsify = {
          name: sidebarName,
          repo: false,
          loadSidebar: true,
          // Pin sidebar/navbar resolution to the root copy. Without this,
          // Docsify walks up from the current route probing for _sidebar.md
          // at each level. Firebase's SPA rewrite returns index.html for
          // those 404s, which Docsify then treats as a valid (but broken)
          // sidebar. Local live-server returns real 404s so this only
          // surfaces when deployed.
          alias: Object.assign({
            '/.*/_sidebar.md': '/_sidebar.md',
            '/.*/_navbar.md': '/_navbar.md'
          }, docsifyOpts.alias || {}),
          subMaxLevel: docsifyOpts.subMaxLevel || 3,
          auto2top: true,
          // Treat single newlines in markdown as <br>. Without this,
          // metadata blocks like "**Prepared for:** ...\n**Subject:** ..."
          // render as one inline run because marked.js collapses single
          // newlines to spaces by default. OPORD/WARNO copy headers and
          // signature blocks rely on the same pattern.
          markdown: { breaks: true },
          search: docsifyOpts.search ? {
            placeholder: 'Search...',
            noData: 'No results',
            depth: 3
          } : false,
          plugins: [
            function(hook) {
              // Strip leading YAML frontmatter so authoring planning docs
              // with frontmatter (in the spirit of OPORD/Plan templates)
              // doesn't render the YAML as page content.
              hook.beforeEach(function(content) {
                return content.replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n/, '');
              });

              // Transform mermaid code blocks into mermaid divs
              hook.afterEach(function(html) {
                return html.replace(/<pre[^>]*><code[^>]*class="lang-mermaid"[^>]*>([\s\S]*?)<\/code><\/pre>/gi, function(m, code) {
                  return '<div class="mermaid">' + code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"') + '</div>';
                });
              });

              hook.doneEach(function() {
                // Render mermaid diagrams
                if (window.mermaid) {
                  try { mermaid.run(); } catch(e) {}
                }

                // Mermaid click-to-zoom
                document.querySelectorAll('.mermaid').forEach(function(el) {
                  if (el.dataset.zoomBound) return;
                  el.dataset.zoomBound = '1';
                  el.addEventListener('click', function() {
                    var svg = el.querySelector('svg');
                    if (!svg) return;
                    var overlay = document.createElement('div');
                    overlay.className = 'mermaid-overlay';
                    overlay.appendChild(svg.cloneNode(true));
                    overlay.addEventListener('click', function() { overlay.remove(); });
                    document.body.appendChild(overlay);
                  });
                });

                // Treat links to binary source files as downloads so Docsify's
                // router doesn't hijack them into an empty SPA page, and so the
                // browser saves the real file instead of the SPA shell.
                //   1. strip the leading '#' Docsify adds for hash routing
                //      (otherwise 'download' on '#/foo.xlsx' saves the current
                //      page as download.htm)
                //   2. target=_blank bypasses Docsify's click interception
                //   3. download forces browser save
                document.querySelectorAll('.markdown-section a[href]').forEach(function(a) {
                  var href = a.getAttribute('href') || '';
                  if (/\.(pdf|docx?|xlsx?|xlsm|pptx?|eml|zip|csv)(\?.*)?$/i.test(href)) {
                    if (href.charAt(0) === '#') {
                      href = href.slice(1);
                      a.setAttribute('href', href);
                    }
                    if (!a.hasAttribute('target')) a.setAttribute('target', '_blank');
                    if (!a.hasAttribute('rel')) a.setAttribute('rel', 'noopener');
                    if (!a.hasAttribute('download')) a.setAttribute('download', '');
                  }
                });

                // Inject data-label attributes for mobile stacked tables
                var tables = document.querySelectorAll('.markdown-section table');
                tables.forEach(function(table) {
                  var headers = [];
                  table.querySelectorAll('thead th').forEach(function(th) {
                    headers.push(th.textContent.trim());
                  });
                  if (headers.length) {
                    table.querySelectorAll('tbody tr').forEach(function(tr) {
                      tr.querySelectorAll('td').forEach(function(td, i) {
                        if (headers[i]) td.setAttribute('data-label', headers[i]);
                      });
                    });
                  }
                });
              });
            },
            // Host bridge — announce the current docsify route to a hosting
            // parent (e.g. the TabulaKit VS Code extension's preview panel)
            // so it can render a breadcrumb. No-op when not framed. The
            // inbound side (back / forward / reload) is registered above
            // as a top-level message listener.
            function(hook) {
              hook.doneEach(function() {
                if (window.parent && window.parent !== window) {
                  window.parent.postMessage({
                    type: 'tabulakit:route',
                    path: location.hash || '#/'
                  }, '*');
                }
              });
            }
          ]
        };

        // Load search plugin before docsify so it registers during init
        if (docsifyOpts.search) {
          var searchScript = document.createElement('script');
          searchScript.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js';
          searchScript.onload = function() {
            var docsifyScript = document.createElement('script');
            docsifyScript.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js';
            document.body.appendChild(docsifyScript);
          };
          document.body.appendChild(searchScript);
        } else {
          var docsifyScript = document.createElement('script');
          docsifyScript.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js';
          document.body.appendChild(docsifyScript);
        }
      }

      // --- Public mode: skip auth entirely ---
      if (auth.mode === "public") {
        loadDocsify();
        return;
      }

      // --- Authenticated modes: show gate ---
      var gate = document.getElementById('auth-gate');
      gate.style.display = 'flex';
      document.getElementById('auth-site-name').textContent = config.name || "Documentation";
      document.getElementById('auth-site-desc').textContent = config.description || "";

      if (auth.mode === "domain") {
        document.getElementById('auth-hint').textContent = "Sign in with your " + auth.allowedDomain + " account";
      } else {
        document.getElementById('auth-hint').textContent = "Sign in with an authorized account";
      }

      if (auth.allowEmailLink && auth.mode === "allowlist") {
        document.getElementById('email-link-section').style.display = '';
      }

      // Load Firebase and set up auth
      function loadScript(src) {
        return new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.type = 'module';
          s.textContent = 'import * as m from "' + src + '"; window.__fb_mod = window.__fb_mod || {}; window.__fb_mod["' + src + '"] = m; document.dispatchEvent(new Event("fb_loaded"));';
          document.head.appendChild(s);
        });
      }

      // Use ES module imports for Firebase
      var initScript = document.createElement('script');
      initScript.type = 'module';
      initScript.textContent = [
        'import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";',
        'import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";',
        '',
        'var auth = window.TABULAKIT_AUTH;',
        'var app = initializeApp(auth.firebase);',
        'var fbAuth = getAuth(app);',
        'var provider = new GoogleAuthProvider();',
        '',
        'if (auth.mode === "domain" && auth.allowedDomain) {',
        '  provider.setCustomParameters({ hd: auth.allowedDomain });',
        '}',
        '',
        'function checkEmail(email) {',
        '  if (!email) return false;',
        '  email = String(email).toLowerCase();',
        '  if (auth.mode === "domain") {',
        '    return email.endsWith("@" + String(auth.allowedDomain || "").toLowerCase());',
        '  }',
        '  if (auth.mode === "allowlist") {',
        '    var domains = (auth.allowedDomains || []).map(function(d){ return String(d).toLowerCase(); });',
        '    for (var i = 0; i < domains.length; i++) {',
        '      if (domains[i] && email.endsWith("@" + domains[i])) return true;',
        '    }',
        '    var emails = (auth.allowedEmails || []).map(function(e){ return String(e).toLowerCase(); });',
        '    return emails.indexOf(email) !== -1;',
        '  }',
        '  return false;',
        '}',
        '',
        'function showError(msg) {',
        '  var el = document.getElementById("auth-error");',
        '  el.textContent = msg;',
        '  el.style.display = "";',
        '  document.getElementById("sign-in-btn").disabled = false;',
        '  var linkBtn = document.getElementById("email-link-btn");',
        '  if (linkBtn) linkBtn.disabled = false;',
        '}',
        '',
        'window.signIn = async function() {',
        '  document.getElementById("sign-in-btn").disabled = true;',
        '  document.getElementById("auth-error").style.display = "none";',
        '  try {',
        '    var result = await signInWithPopup(fbAuth, provider);',
        '    if (!checkEmail(result.user.email)) {',
        '      await fbAuth.signOut();',
        '      showError("Access denied. Your account is not authorized.");',
        '      return;',
        '    }',
        '    window.__tabulakit_loadDocsify();',
        '  } catch (e) {',
        '    showError("Sign-in failed. Please try again.");',
        '  }',
        '};',
        '',
        'window.sendEmailLink = async function() {',
        '  var input = document.getElementById("email-input");',
        '  var email = String(input && input.value || "").trim().toLowerCase();',
        '  if (!email) { showError("Please enter your email address."); return; }',
        '  if (!checkEmail(email)) { showError("This email is not authorized for this site."); return; }',
        '  var btn = document.getElementById("email-link-btn");',
        '  var statusEl = document.getElementById("email-link-status");',
        '  btn.disabled = true;',
        '  document.getElementById("auth-error").style.display = "none";',
        '  statusEl.style.display = "none";',
        '  try {',
        '    await sendSignInLinkToEmail(fbAuth, email, {',
        '      url: window.location.origin + window.location.pathname,',
        '      handleCodeInApp: true',
        '    });',
        '    window.localStorage.setItem("emailForSignIn", email);',
        '    statusEl.textContent = "Sign-in link sent to " + email + ". Check your inbox and click the link to complete sign-in.";',
        '    statusEl.style.display = "";',
        '  } catch (e) {',
        '    showError("Failed to send sign-in link. Please try again.");',
        '  } finally {',
        '    btn.disabled = false;',
        '  }',
        '};',
        '',
        '// Handle return from email sign-in link',
        'if (auth.allowEmailLink && isSignInWithEmailLink(fbAuth, window.location.href)) {',
        '  var storedEmail = window.localStorage.getItem("emailForSignIn");',
        '  if (!storedEmail) {',
        '    storedEmail = window.prompt("Please confirm the email you used to request the sign-in link:");',
        '  }',
        '  if (storedEmail) {',
        '    signInWithEmailLink(fbAuth, storedEmail, window.location.href).then(function(result) {',
        '      window.localStorage.removeItem("emailForSignIn");',
        '      history.replaceState(null, "", window.location.pathname);',
        '      if (!checkEmail(result.user.email)) {',
        '        fbAuth.signOut();',
        '        showError("Access denied. Your account is not authorized.");',
        '        return;',
        '      }',
        '      window.__tabulakit_loadDocsify();',
        '    }).catch(function(e) {',
        '      showError("Sign-in link is invalid or has expired. Please request a new one.");',
        '    });',
        '  }',
        '}',
        '',
        '// Auto-login for returning users',
        'if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {',
        '  window.__tabulakit_loadDocsify();',
        '} else {',
        '  onAuthStateChanged(fbAuth, function(user) {',
        '    if (user && checkEmail(user.email)) {',
        '      window.__tabulakit_loadDocsify();',
        '    }',
        '  });',
        '}'
      ].join('\n');

      window.__tabulakit_loadDocsify = loadDocsify;
      document.head.appendChild(initScript);
    })();
  </script>
</body>
</html>
